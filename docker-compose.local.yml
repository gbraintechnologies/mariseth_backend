
volumes:
  redis_data:
  postgres_data:
  elastic_search_data:
networks:
  app_network:
    driver: bridge

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - SERVICE_TYPE=web
      - ENVIRONMENT=local
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5437:${DB_PORT}"
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
        - app_network
    restart: always


  redis:
    image: "redis:latest"
    volumes:
      - 'redis_data:/data'
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always

  celery:
    build: .
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    networks:
      - app_network
    environment:
      - SERVICE_TYPE=celery
      - ENVIRONMENT=local
    command: celery -A mariseth worker -l info -Q local
    healthcheck:
      test: [ "CMD-SHELL", "celery -A iyf_connect inspect ping | grep -q 'pong'" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: always


  celery-beat:
    build: .
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    networks:
      - app_network
    environment:
      - SERVICE_TYPE=celery-beat
      - ENVIRONMENT=local
    command: celery -A mariseth beat -l info
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
