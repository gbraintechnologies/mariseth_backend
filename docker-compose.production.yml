volumes:
  redis_data:
  elastic_search_data:
services:
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - ./.env
    environment:
      - SERVICE_TYPE=web
      - ENVIRONMENT=production
      - REDIS_HOST=redis-master
      - REDIS_URL=redis://redis-master:6379
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  celery:
    build: .
    command: celery -A mariseth worker -l info -Q production
    volumes:
      - .:/app
    env_file:
      - ./.env
    environment:
      - SERVICE_TYPE=celery
      - ENVIRONMENT=production
      - REDIS_HOST=redis-master
      - REDIS_URL=redis://redis-master:6379
      - CELERY_BROKER_URL=redis://redis-master:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-master:6379/0
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "celery -A mariseth inspect ping | grep -q 'pong'" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: always

  celery-beat:
    build: .
    command: sh -c "celery -A mariseth beat -l info"
    volumes:
      - .:/app
    env_file:
      - ./.env
    environment:
      - SERVICE_TYPE=celery-beat
      - ENVIRONMENT=production
      - REDIS_HOST=redis-master
      - REDIS_URL=redis://redis-master:6379
      - CELERY_BROKER_URL=redis://redis-master:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-master:6379/0
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
