volumes:
  redis_data:
  elastic_search_data:
networks:
  app_network:
    driver: bridge

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - ./.env
    environment:
      - SERVICE_TYPE=web
      - ENVIRONMENT=production
    networks:
      - app_network
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  celery:
    build: .
    command: celery -A mariseth worker -l info -Q production
    volumes:
      - .:/app
    env_file:
      - ./.env
    networks:
      - app_network
    environment:
      - SERVICE_TYPE=celery
      - ENVIRONMENT=production
    healthcheck:
      test: [ "CMD-SHELL", "celery -A mariseth inspect ping | grep -q 'pong'" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: always

  celery-beat:
    build: .
    command: sh -c "celery -A mariseth beat -l info"
    volumes:
      - .:/app
    env_file:
      - ./.env
    networks:
      - app_network
    environment:
      - SERVICE_TYPE=celery-beat
      - ENVIRONMENT=production
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
