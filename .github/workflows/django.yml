name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Trigger Coolify Deployment
      run: |
        response=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "branch": "main",
            "force_rebuild": true,
            "commit_sha": "${{ github.sha }}"
          }' \
          "${{ secrets.COOLIFY_WEBHOOK_URL }}")
        
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | head -n -1)
        
        echo "HTTP Status: $http_code"
        echo "Response: $body"
        
        if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
          echo "✅ Deployment triggered successfully"
        else
          echo "❌ Deployment failed with status $http_code"
          exit 1
        fi

    - name: Wait for deployment completion
      run: |
        echo "⏳ Waiting for deployment to complete..."
        sleep 30
        
        max_attempts=20
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "🔍 Checking deployment status (attempt $attempt/$max_attempts)..."
          
          status_response=$(curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ secrets.COOLIFY_STATUS_URL }}" || echo "error")
          
          if echo "$status_response" | grep -q "running\|success\|deployed"; then
            echo "✅ Deployment completed successfully!"
            break
          elif echo "$status_response" | grep -q "failed\|error"; then
            echo "❌ Deployment failed!"
            exit 1
          fi
          
          sleep 15
          attempt=$((attempt + 1))
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "⚠️ Deployment status check timed out"
          exit 1
        fi

    - name: Health Check
      run: |
        echo "🏥 Performing health check..."
        sleep 10
        
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "🔍 Health check attempt $attempt/$max_attempts..."
          
          if curl -f -s "${{ secrets.APP_URL }}/health/" > /dev/null; then
            echo "✅ Application is healthy and responding!"
            exit 0
          fi
          
          sleep 10
          attempt=$((attempt + 1))
        done
        
        echo "❌ Health check failed - application may not be responding"
        exit 1

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 Deployment completed successfully!"
          # Add notification logic here (Slack, email, etc.)
        else
          echo "💥 Deployment failed!"
          # Add failure notification logic here
          exit 1
        fi