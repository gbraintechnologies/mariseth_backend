name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Trigger Coolify Deployment
      run: |
          curl 'https://app.coolify.io/api/v1/deploy?uuid=bg8o8wkgw0kow8s0gsg480ok' \
          --header 'Authorization: Bearer 749|zSBdoh7GBx8n7qF76as8R5nR4ZjbEyjC936TJRNMbdbee54a'

    - name: Wait for deployment completion
      run: |
        echo "⏳ Waiting for deployment to complete..."
        sleep 30
        
        # Optional: Poll deployment status if Coolify provides a status endpoint
        # Replace with your actual deployment status URL
        max_attempts=20
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "🔍 Checking deployment status (attempt $attempt/$max_attempts)..."
          
          # This is a placeholder - replace with actual Coolify status endpoint
          status_response=$(curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            ${{ secrets.COOLIFY_STATUS_URL }} || echo "error")
          
          if echo "$status_response" | grep -q "running\|success\|deployed"; then
            echo "✅ Deployment completed successfully!"
            break
          elif echo "$status_response" | grep -q "failed\|error"; then
            echo "❌ Deployment failed!"
            exit 1
          fi
          
          sleep 15
          attempt=$((attempt + 1))
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "⚠️ Deployment status check timed out, but this might be normal"
        fi

    - name: Health Check
      run: |
        echo "🏥 Performing health check..."
        sleep 10
        
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "🔍 Health check attempt $attempt/$max_attempts..."
          
          if curl -f -s ${{ secrets.APP_URL }}/health/ > /dev/null; then
            echo "✅ Application is healthy and responding!"
            break
          fi
          
          sleep 10
          attempt=$((attempt + 1))
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Health check failed - application may not be responding"
          exit 1
        fi

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 Deployment completed successfully!"
        else
          echo "💥 Deployment failed!"
        fi
